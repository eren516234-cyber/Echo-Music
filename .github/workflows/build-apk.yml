name: Build YVL Music APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install mobile dependencies (npm, no workspace)
        working-directory: artifacts/mobile
        run: npm install --legacy-peer-deps

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Expo prebuild Android
        working-directory: artifacts/mobile
        run: npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_TELEMETRY: 1
          EXPO_NO_GIT_STATUS: 1

      - name: Build debug APK
        working-directory: artifacts/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --max-workers 2
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3g -Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YVL-Music-APK
          path: artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Done
        run: |
          echo "## ✅ YVL Music APK Built!" >> $GITHUB_STEP_SUMMARY
          echo "Download from **Artifacts** above." >> $GITHUB_STEP_SUMMARY
          size=$(du -sh artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)
          echo "Size: $size" >> $GITHUB_STEP_SUMMARY
