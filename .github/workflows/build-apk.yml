name: Build YVL Music APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Patch package.json
        working-directory: artifacts/mobile
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
          const catalog = {
            '@tanstack/react-query':'5.90.21',
            'react':'19.1.0',
            'react-dom':'19.1.0',
            'zod':'3.25.76'
          };
          for(const sec of ['dependencies','devDependencies']){
            if(!pkg[sec]) continue;
            for(const [k,v] of Object.entries(pkg[sec])){
              if(v==='catalog:') pkg[sec][k]=catalog[k]||'latest';
              if(v.startsWith('workspace:')) delete pkg[sec][k];
            }
          }
          // remove packages that block prebuild
          const blocklist = ['expo-glass-effect'];
          for(const sec of ['dependencies','devDependencies']){
            if(!pkg[sec]) continue;
            for(const b of blocklist) delete pkg[sec][b];
          }
          fs.writeFileSync('package.json',JSON.stringify(pkg,null,2));
          console.log('Patched OK');
          "

      - name: Patch app.json (disable newArch for compat)
        working-directory: artifacts/mobile
        run: |
          node -e "
          const fs = require('fs');
          const app = JSON.parse(fs.readFileSync('app.json','utf8'));
          delete app.expo.newArchEnabled;
          delete app.expo.experiments;
          // keep only safe plugins
          app.expo.plugins = [
            ['expo-router', {'origin':'https://replit.com/'}],
            'expo-font',
            'expo-web-browser'
          ];
          fs.writeFileSync('app.json', JSON.stringify(app,null,2));
          console.log('app.json patched');
          "

      - name: Install mobile dependencies
        working-directory: artifacts/mobile
        run: npm install --legacy-peer-deps 2>&1 | tail -20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Expo prebuild Android
        working-directory: artifacts/mobile
        run: |
          npx expo prebuild --platform android --no-install --clean 2>&1
        env:
          EXPO_NO_TELEMETRY: 1
          EXPO_NO_GIT_STATUS: 1
          CI: 1

      - name: Build debug APK
        working-directory: artifacts/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --max-workers 2 2>&1 | tail -50
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3g -Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YVL-Music-APK
          path: artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Summary
        run: |
          SIZE=$(du -sh artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk 2>/dev/null | cut -f1 || echo "?")
          echo "## ✅ YVL Music APK Ready!" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** com.yvl.music" >> $GITHUB_STEP_SUMMARY
          echo "Download from the **Artifacts** tab above." >> $GITHUB_STEP_SUMMARY
